- name: Ensure .ssh folder exists
  file:
    path: "{{myhomedir}}/.ssh"
    state: directory
    mode: '0700'
  become: false

- name: Find SSH private keys
  ansible.builtin.find:
    paths: "{{myhomedir}}/.ssh"
    patterns: "id_*"
    excludes: "*.pub"
    file_type: file
  register: ssh_private_keys_found
  become: false

- name: Fix permissions of SSH private keys
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ ansible_user }}"
    group: staff
    mode: '0600'
  loop: "{{ ssh_private_keys_found.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  no_log: true

- name: Find SSH public keys
  ansible.builtin.find:
    paths: "{{myhomedir}}/.ssh"
    patterns: "id_*.pub"
    file_type: file
  register: ssh_public_keys_found
  become: false

- name: Fix permissions of SSH public keys
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ ansible_user }}"
    group: staff
    mode: '0644'
  loop: "{{ ssh_public_keys_found.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
